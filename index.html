<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MatrimonyMatch Demo</title>
  <style>
    :root{
      --primary:#e11d48;--primary-dark:#be123c;--text:#1f2937;--muted:#6b7280;
      --bg:#fff7f9;--card:#fff;--border:#e5e7eb;--ok:#16a34a;
    }
    *{box-sizing:border-box} body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;color:var(--text);background:#fff}
    .container{max-width:1120px;margin:auto;padding:0 16px}
    .top{border-bottom:1px solid var(--border);background:#fff;position:sticky;top:0;z-index:10}
    .top .row{display:flex;justify-content:space-between;align-items:center;padding:12px 0}
    .logo{font-weight:800;color:var(--primary)} .btn{border:none;border-radius:10px;padding:10px 14px;cursor:pointer;font-weight:600}
    .btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-dark)}
    .btn-light{background:#fff;border:1px solid var(--border)} .btn-ok{background:var(--ok);color:#fff}
    .hidden{display:none!important} .muted{color:var(--muted)} .small{font-size:.9rem}
    .auth-wrap{min-height:calc(100vh - 60px);display:grid;grid-template-columns:1.1fr 1fr;background:linear-gradient(120deg,#fff1f2,#fff)}
    .auth-left{padding:48px 24px}.auth-left h1{margin:0 0 8px;font-size:2rem}
    .auth-right{display:flex;align-items:center;justify-content:center;padding:24px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:0 8px 24px rgba(0,0,0,.06)}
    .auth-card{width:100%;max-width:420px}
    .tabs{display:flex;gap:8px;margin-bottom:12px}.tab{flex:1;padding:10px;border:1px solid var(--border);border-radius:10px;background:#fff;cursor:pointer}
    .tab.active{background:#ffe4eb;border-color:#fecdd3;color:#9f1239;font-weight:700}
    label{display:block;font-size:.85rem;margin:8px 0 5px;color:#374151}
    input,select{width:100%;padding:10px;border:1px solid #d1d5db;border-radius:10px}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .gap{height:10px} .msg{padding:10px;border-radius:10px;font-size:.9rem;margin-top:10px}
    .msg.err{background:#fef2f2;color:#991b1b}.msg.ok{background:#ecfdf5;color:#065f46}
    .app{padding:24px 0;background:var(--bg);min-height:calc(100vh - 60px)}
    .panel{background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
    .stat{background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px}
    .filters{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
    .profiles{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:14px}
    .profile{background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px}
    .topline{display:flex;gap:10px;align-items:center}
    .avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#ffe4e6;color:#9f1239;font-weight:800}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .pill{display:inline-block;padding:4px 8px;border-radius:999px;background:#f3f4f6;font-size:.75rem;margin-top:8px}
    @media (max-width:960px){.auth-wrap{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.filters{grid-template-columns:repeat(2,1fr)}.profiles{grid-template-columns:repeat(2,1fr)}}
    @media (max-width:640px){.profiles,.filters,.stats{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header class="top">
    <div class="container row">
      <div class="logo">MatrimonyMatch</div>
      <div id="topRight"><span class="small muted">Demo site</span></div>
    </div>
  </header>

  <!-- AUTH VIEW -->
  <section id="authView" class="auth-wrap">
    <div class="auth-left container">
      <h1>Trusted Matrimony Login</h1>
      <p class="muted">BharatMatrimony-style demo flow: password login, OTP login, signup, and profile browsing.</p>
    </div>
    <div class="auth-right">
      <div class="card auth-card">
        <div class="tabs">
          <button class="tab active" id="tabLogin">Login</button>
          <button class="tab" id="tabSignup">Sign Up</button>
        </div>

        <div id="loginBox">
          <label>Email or Mobile</label>
          <input id="loginIdentifier" placeholder="name@email.com or 9876543210" />
          <label>Password</label>
          <input id="loginPassword" type="password" placeholder="Enter password" />
          <div class="gap"></div>
          <button class="btn btn-primary" style="width:100%" onclick="loginWithPassword()">Login</button>

          <div class="gap"></div><hr style="border:none;border-top:1px solid #eee"><div class="gap"></div>
          <label>OTP Login (demo)</label>
          <div class="row2">
            <button class="btn btn-light" onclick="sendOtp()">Send OTP</button>
            <input id="otpCode" placeholder="Enter OTP" />
          </div>
          <div class="gap"></div>
          <button class="btn btn-light" style="width:100%" onclick="loginWithOtp()">Login with OTP</button>
          <div id="loginMsg"></div>
        </div>

        <div id="signupBox" class="hidden">
          <label>Full Name</label><input id="suName" placeholder="Your name" />
          <div class="row2">
            <div><label>Email</label><input id="suEmail" placeholder="you@email.com" /></div>
            <div><label>Mobile</label><input id="suPhone" placeholder="10 digit mobile" /></div>
          </div>
          <div class="row2">
            <div><label>Gender</label><select id="suGender"><option>Female</option><option>Male</option></select></div>
            <div><label>Age</label><input id="suAge" type="number" min="18" max="70" placeholder="Age" /></div>
          </div>
          <label>Password</label><input id="suPassword" type="password" placeholder="Create password" />
          <div class="gap"></div>
          <button class="btn btn-primary" style="width:100%" onclick="signup()">Create Account</button>
          <div id="signupMsg"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- APP VIEW -->
  <section id="appView" class="app hidden">
    <div class="container">
      <div class="stats">
        <div class="stat"><b id="s1">0</b><div class="small muted">Profiles shown</div></div>
        <div class="stat"><b id="s2">0</b><div class="small muted">Interests sent</div></div>
        <div class="stat"><b id="s3">0</b><div class="small muted">Shortlisted</div></div>
        <div class="stat"><b id="s4">0</b><div class="small muted">My age</div></div>
      </div>

      <div class="panel">
        <div class="filters">
          <input id="fSearch" placeholder="Search by name/profession" />
          <input id="fAgeMin" type="number" placeholder="Min age" />
          <input id="fAgeMax" type="number" placeholder="Max age" />
          <select id="fReligion"><option value="">Any religion</option><option>Hindu</option><option>Christian</option><option>Muslim</option></select>
          <select id="fCity"><option value="">Any city</option><option>Chennai</option><option>Bengaluru</option><option>Coimbatore</option><option>Madurai</option></select>
        </div>
        <div class="gap"></div>
        <button class="btn btn-primary" onclick="renderProfiles()">Apply Filters</button>
      </div>

      <div id="profileList" class="profiles"></div>
    </div>
  </section>

  <script>
    const seedProfiles = [
      {id:1,name:"Ananya R",gender:"Female",age:26,religion:"Hindu",city:"Chennai",profession:"Software Engineer"},
      {id:2,name:"Karthik S",gender:"Male",age:29,religion:"Hindu",city:"Coimbatore",profession:"Data Analyst"},
      {id:3,name:"Priya M",gender:"Female",age:28,religion:"Christian",city:"Bengaluru",profession:"Product Designer"},
      {id:4,name:"Rahman A",gender:"Male",age:27,religion:"Muslim",city:"Chennai",profession:"Architect"},
      {id:5,name:"Deepa N",gender:"Female",age:25,religion:"Hindu",city:"Madurai",profession:"Doctor"},
      {id:6,name:"Joel P",gender:"Male",age:30,religion:"Christian",city:"Coimbatore",profession:"Consultant"},
      {id:7,name:"Divya L",gender:"Female",age:27,religion:"Hindu",city:"Bengaluru",profession:"HR Manager"},
      {id:8,name:"Arun V",gender:"Male",age:31,religion:"Hindu",city:"Chennai",profession:"Project Manager"}
    ];
    let otpMap = {};

    const $ = (id)=>document.getElementById(id);
    const getJSON = (k,d)=>JSON.parse(localStorage.getItem(k)||JSON.stringify(d));
    const setJSON = (k,v)=>localStorage.setItem(k,JSON.stringify(v));

    function getUsers(){ return getJSON("mm_users", []); }
    function setUsers(v){ setJSON("mm_users", v); }
    function currentUserId(){ return localStorage.getItem("mm_current_user_id"); }
    function setCurrentUserId(id){ if(id) localStorage.setItem("mm_current_user_id", id); else localStorage.removeItem("mm_current_user_id"); }
    function currentUser(){ return getUsers().find(u => String(u.id) === String(currentUserId())); }

    function getActions(uid){ return getJSON("mm_actions_"+uid, {interests:[], shortlist:[]}); }
    function setActions(uid,val){ setJSON("mm_actions_"+uid, val); }

    function showMsg(id,type,text){
      $(id).innerHTML = `<div class="msg ${type}">${text}</div>`;
    }

    function findUserByIdentifier(identifier){
      const key = (identifier||"").trim().toLowerCase();
      return getUsers().find(u => u.email.toLowerCase()===key || u.phone===key);
    }

    function signup(){
      const name=$("suName").value.trim(), email=$("suEmail").value.trim().toLowerCase(), phone=$("suPhone").value.trim();
      const gender=$("suGender").value, age=Number($("suAge").value), password=$("suPassword").value;
      if(!name || !email || !phone || !age || !password){ return showMsg("signupMsg","err","Please fill all fields."); }
      if(phone.length<10){ return showMsg("signupMsg","err","Enter valid mobile number."); }
      const users=getUsers();
      if(users.some(u=>u.email===email || u.phone===phone)) return showMsg("signupMsg","err","Email or mobile already registered.");
      const user={id:Date.now(),name,email,phone,gender,age,password};
      users.push(user); setUsers(users);
      showMsg("signupMsg","ok","Account created. Please login.");
      $("tabLogin").click();
    }

    function loginWithPassword(){
      const idf=$("loginIdentifier").value.trim(), pwd=$("loginPassword").value;
      const user=findUserByIdentifier(idf);
      if(!user || user.password!==pwd) return showMsg("loginMsg","err","Invalid credentials.");
      setCurrentUserId(user.id); renderApp();
    }

    function sendOtp(){
      const idf=$("loginIdentifier").value.trim(); const user=findUserByIdentifier(idf);
      if(!user) return showMsg("loginMsg","err","User not found.");
      const otp=String(Math.floor(100000+Math.random()*900000));
      otpMap[idf.toLowerCase()] = otp;
      showMsg("loginMsg","ok","Demo OTP sent: <b>"+otp+"</b>");
    }

    function loginWithOtp(){
      const idf=$("loginIdentifier").value.trim().toLowerCase(), code=$("otpCode").value.trim();
      const user=findUserByIdentifier(idf);
      if(!user) return showMsg("loginMsg","err","User not found.");
      if(otpMap[idf]!==code) return showMsg("loginMsg","err","Invalid OTP.");
      setCurrentUserId(user.id); renderApp();
    }

    function logout(){ setCurrentUserId(null); renderApp(); }

    function toggleAction(type, profileId){
      const user=currentUser(); if(!user) return;
      const a=getActions(user.id), list=a[type];
      const i=list.indexOf(profileId); if(i>=0) list.splice(i,1); else list.push(profileId);
      setActions(user.id,a); renderProfiles();
    }

    function filteredProfiles(){
      const user=currentUser(); if(!user) return [];
      const q=$("fSearch").value.trim().toLowerCase(), min=Number($("fAgeMin").value||18), max=Number($("fAgeMax").value||70);
      const religion=$("fReligion").value, city=$("fCity").value;
      const oppositeGender = user.gender==="Male" ? "Female" : "Male";

      return seedProfiles.filter(p =>
        p.gender===oppositeGender &&
        p.age>=min && p.age<=max &&
        (!religion || p.religion===religion) &&
        (!city || p.city===city) &&
        (!q || p.name.toLowerCase().includes(q) || p.profession.toLowerCase().includes(q))
      );
    }

    function renderProfiles(){
      const user=currentUser(); if(!user) return;
      const data=filteredProfiles(), a=getActions(user.id), root=$("profileList");
      root.innerHTML="";
      if(!data.length){ root.innerHTML=`<div class="panel">No profiles found.</div>`; updateStats(0,a,user); return; }

      data.forEach(p=>{
        const initials=p.name.split(" ").map(x=>x[0]).join("").slice(0,2);
        const interested=a.interests.includes(p.id), shortlisted=a.shortlist.includes(p.id);
        root.innerHTML += `
          <div class="profile">
            <div class="topline">
              <div class="avatar">${initials}</div>
              <div><b>${p.name}</b><div class="small muted">${p.age} yrs • ${p.profession}</div></div>
            </div>
            <div class="small muted" style="margin-top:8px">${p.city} • ${p.religion}</div>
            <span class="pill">Verified Profile</span>
            <div class="actions">
              <button class="btn ${interested?'btn-ok':'btn-light'}" onclick="toggleAction('interests',${p.id})">${interested?'Interest Sent':'Send Interest'}</button>
              <button class="btn ${shortlisted?'btn-primary':'btn-light'}" onclick="toggleAction('shortlist',${p.id})">${shortlisted?'Shortlisted':'Shortlist'}</button>
            </div>
          </div>`;
      });
      updateStats(data.length,a,user);
    }

    function updateStats(shown,a,u){
      $("s1").textContent = shown;
      $("s2").textContent = a.interests.length;
      $("s3").textContent = a.shortlist.length;
      $("s4").textContent = u.age;
    }

    function renderApp(){
      const user=currentUser();
      if(user){
        $("authView").classList.add("hidden");
        $("appView").classList.remove("hidden");
        $("topRight").innerHTML = `<span class="small muted">Hi, ${user.name}</span> <button class="btn btn-light" onclick="logout()">Logout</button>`;
        renderProfiles();
      }else{
        $("appView").classList.add("hidden");
        $("authView").classList.remove("hidden");
        $("topRight").innerHTML = `<span class="small muted">Demo site</span>`;
      }
    }

    // tabs
    $("tabLogin").onclick=()=>{ $("tabLogin").classList.add("active"); $("tabSignup").classList.remove("active"); $("loginBox").classList.remove("hidden"); $("signupBox").classList.add("hidden"); };
    $("tabSignup").onclick=()=>{ $("tabSignup").classList.add("active"); $("tabLogin").classList.remove("active"); $("signupBox").classList.remove("hidden"); $("loginBox").classList.add("hidden"); };

    // bootstrap
    if(!getUsers().length){
      setUsers([{id:1001,name:"Demo User",email:"demo@matrimony.com",phone:"9876543210",gender:"Male",age:29,password:"Demo@123"}]);
    }
    renderApp();
  </script>
</body>
</html>
